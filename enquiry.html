<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get a Quote | Sweet Cake Studio | Custom Cakes Midrand</title>
  <meta name="description" content="Request a custom cake quote from Sweet Cake Studio in Midrand. Birthday, wedding & celebration cakes. Get pricing within 24 hours.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="about.html">About</a>
      <a href="deliveries.html">Deliveries</a>
      <a href="contact.html">Contact</a>
      <a href="enquiry.html" class="active">Get Quote</a>
    </nav>
  </header>

  <main class="enquiry-page">
    <h1>Request Your Custom Cake Quote</h1>
    <p>Tell us about your dream cake and we’ll send you pricing + availability within 24 hours.</p>

    <form id="enquiryForm" action="https://formsubmit.co/seedatrudo4@email.com" method="POST">
      <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name" required>
        <span class="error" id="nameError"></span>
      </div>

      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" required placeholder="you@email.com">
        <span class="error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number *</label>
        <input type="tel" id="phone" name="phone" required placeholder="0712345678">
        <span class="error" id="phoneError"></span>
      </div>

      <div class="form-group">
        <label for="date">Date Needed *</label>
        <input type="date" id="date" name="date" required>
        <span class="error" id="dateError"></span>
      </div>

      <div class="form-group">
        <label for="cakeType">Cake Type *</label>
        <select id="cakeType" name="cakeType" required>
          <option value="">Select cake type...</option>
          <option value="Birthday">Birthday Cake</option>
          <option value="Wedding">Wedding Cake</option>
          <option value="Cupcakes">Cupcakes</option>
          <option value="Celebration">Celebration Cake</option>
          <option value="Vegan">Vegan Cake</option>
          <option value="Custom Design">Custom Design</option>
        </select>
      </div>

      <div class="form-group">
        <label for="servings">Number of Servings *</label>
        <input type="number" id="servings" name="servings" min="1" max="500" required placeholder="e.g. 30">
      </div>

      <div class="form-group">
        <label for="flavor">Preferred Flavor</label>
        <select id="flavor" name="flavor">
          <option value="">Select flavor...</option>
          <option value="Chocolate">Chocolate</option>
          <option value="Vanilla">Vanilla</option>
          <option value="Red Velvet">Red Velvet</option>
          <option value="Lemon">Lemon</option>
          <option value="Carrot">Carrot</option>
          <option value="Other">
